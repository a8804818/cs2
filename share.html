<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>我的主页</title>

    <!-- ★ 微信卡片设置 ★ -->
    <meta property="og:title" content="CS2凉秋 调机器服务👉点击查看" />

    <meta property="og:image" content="https://s41.ax1x.com/2026/04/23/peWZxZq.jpg" />
    <!-- 👇 下面换成 share.html 的完整链接 -->
    <meta property="og:url" content="https://cs2-xxj1n01al.maozi.io/share.html" />
    <meta property="og:type" content="website" />

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; overflow: hidden; background: #FFFFFF; }
        .full-frame { width: 100%; height: 100%; border: none; display: block; }
        .loading-tip { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); color: #999; font-size: 14px; font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif; z-index: 0; pointer-events: none; }
        .loading-tip.hidden { display: none; }
    </style>
</head>
<body>
    <div class="loading-tip" id="loadingTip">⏳ 页面加载中...</div>

    <!-- 👇 嵌入您帽子云上的原网页（同源，无需 sandbox） -->
    <iframe class="full-frame"
        src="https://cs2-xxj1n01al.maozi.io/"
        title="我的个人主页"
        loading="eager"
        onload="document.getElementById('loadingTip').classList.add('hidden')"
        onerror="document.getElementById('loadingTip').textContent='⚠️ 加载失败'">
    </iframe>
</body>
</html>
